
<div id="canvas-wrapper" style="position:relative;width:100%;height:520px;overflow:hidden;border-radius:12px;background:#0a0a0f;">
  <canvas id="c" style="width:100%;height:100%;display:block;"></canvas>
  <div id="hud" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">
    <div id="hint" style="position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-family:sans-serif;font-size:13px;color:rgba(255,255,255,0.65);letter-spacing:1.5px;text-transform:uppercase;transition:opacity 0.4s;">Scroll to walk · Click door to open</div>
    <div id="overlay" style="position:absolute;inset:0;background:rgba(5,5,15,0.0);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.6s;pointer-events:none;">
      <div style="background:rgba(15,15,30,0.92);border:1px solid rgba(120,100,255,0.4);border-radius:16px;padding:32px 40px;max-width:340px;text-align:center;backdrop-filter:blur(12px);">
        <div style="font-size:28px;margin-bottom:12px;">✦</div>
        <div style="font-family:sans-serif;font-size:20px;font-weight:600;color:#e8e4ff;margin-bottom:10px;">Databiqs</div>
        <div style="font-family:sans-serif;font-size:13px;color:rgba(200,195,255,0.75);line-height:1.7;">We turn raw data into strategic insight. AI-powered analytics, real-time dashboards, and decision intelligence — built for scale.</div>
        <div style="margin-top:20px;font-family:sans-serif;font-size:11px;color:rgba(140,120,255,0.6);letter-spacing:1px;">SCROLL UP TO STEP BACK</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const wrapper = document.getElementById('canvas-wrapper');
const canvas = document.getElementById('c');
const hint = document.getElementById('hint');
const overlay = document.getElementById('overlay');

const W = wrapper.clientWidth, H = wrapper.clientHeight;
canvas.width = W; canvas.height = H;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.045);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 100);
camera.position.set(0, 1.6, 10);
camera.lookAt(0, 1.4, 0);

// Ambient
scene.add(new THREE.AmbientLight(0x1a1040, 1.2));

// Main light
const dirLight = new THREE.DirectionalLight(0x8070ff, 1.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Door glow point light
const doorLight = new THREE.PointLight(0xaa88ff, 2.5, 8);
doorLight.position.set(0, 2, 1.5);
scene.add(doorLight);

// Floor
const floorGeo = new THREE.PlaneGeometry(12, 40);
const floorMat = new THREE.MeshStandardMaterial({color:0x0d0c1e, roughness:0.9});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Floor grid lines
const gridHelper = new THREE.GridHelper(40, 40, 0x221e4a, 0x150f30);
gridHelper.position.y = 0.001;
scene.add(gridHelper);

// Walls
function makeWall(w,h,d,x,y,z,rx,ry,col){
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col,roughness:0.85}));
  m.position.set(x,y,z); m.rotation.x=rx; m.rotation.y=ry;
  m.castShadow=true; m.receiveShadow=true;
  scene.add(m); return m;
}
// Side walls
makeWall(0.2,5,40,-5.5,2.5,-8,0,0,0x0f0e22);
makeWall(0.2,5,40,5.5,2.5,-8,0,0,0x0f0e22);
// Ceiling
makeWall(12,0.15,40,0,5,-8,0,0,0x0a0918);

// Wall decorations (glowing strips)
for(let z=-15;z<5;z+=4){
  const sg = new THREE.Mesh(new THREE.BoxGeometry(0.05,1.5,0.05), new THREE.MeshStandardMaterial({color:0x6644ff,emissive:0x4422cc,emissiveIntensity:1.5}));
  sg.position.set(-5.4,2.5,z); scene.add(sg);
  const sg2 = sg.clone(); sg2.position.set(5.4,2.5,z); scene.add(sg2);
}

// Door frame
const frameMat = new THREE.MeshStandardMaterial({color:0x3a2f6a, roughness:0.4, metalness:0.6});
// top bar
const ftop = new THREE.Mesh(new THREE.BoxGeometry(2.6,0.25,0.18), frameMat);
ftop.position.set(0,3.75,0); scene.add(ftop);
// side bars
const fl = new THREE.Mesh(new THREE.BoxGeometry(0.2,3.75,0.18), frameMat);
fl.position.set(-1.2,1.875,0); scene.add(fl);
const fr2 = fl.clone(); fr2.position.set(1.2,1.875,0); scene.add(fr2);

// Door panels (two halves)
const doorMat = new THREE.MeshStandardMaterial({color:0x1a1440, roughness:0.3, metalness:0.5, emissive:0x221166, emissiveIntensity:0.4});
const doorL = new THREE.Mesh(new THREE.BoxGeometry(1.0,3.6,0.1), doorMat);
doorL.position.set(-0.5,1.85,0.05);
scene.add(doorL);
const doorR = new THREE.Mesh(new THREE.BoxGeometry(1.0,3.6,0.1), doorMat);
doorR.position.set(0.5,1.85,0.05);
scene.add(doorR);

// Glow plane behind door
const glowGeo = new THREE.PlaneGeometry(2,3.6);
const glowMat = new THREE.MeshBasicMaterial({color:0x6633ff, transparent:true, opacity:0.0, side:THREE.DoubleSide});
const glowPlane = new THREE.Mesh(glowGeo, glowMat);
glowPlane.position.set(0,1.85,-0.05);
scene.add(glowPlane);

// Floating particles
const particles = [];
for(let i=0;i<60;i++){
  const g = new THREE.SphereGeometry(0.025,4,4);
  const m = new THREE.MeshBasicMaterial({color:0x8866ff, transparent:true, opacity:Math.random()*0.6+0.2});
  const p = new THREE.Mesh(g,m);
  p.position.set((Math.random()-0.5)*9, Math.random()*4, (Math.random()-0.5)*30-3);
  p.userData.speed = Math.random()*0.008+0.002;
  p.userData.amp = Math.random()*0.3+0.1;
  p.userData.phase = Math.random()*Math.PI*2;
  particles.push(p);
  scene.add(p);
}

// State
let scroll = 0;
let doorOpen = false;
let doorAngle = 0;
let insideRoom = false;
let showOverlay = false;

// Scroll
wrapper.addEventListener('wheel', (e)=>{
  e.preventDefault();
  if(insideRoom) return;
  scroll = Math.max(0, Math.min(1, scroll + e.deltaY*0.001));
}, {passive:false});

// Touch scroll
let lastTY = null;
wrapper.addEventListener('touchstart', e=>{ lastTY = e.touches[0].clientY; }, {passive:true});
wrapper.addEventListener('touchmove', e=>{
  if(!lastTY) return;
  const dy = lastTY - e.touches[0].clientY;
  scroll = Math.max(0, Math.min(1, scroll + dy*0.003));
  lastTY = e.touches[0].clientY;
}, {passive:true});

// Click door
wrapper.addEventListener('click', ()=>{
  if(scroll > 0.7 && !doorOpen){
    doorOpen = true;
  } else if(insideRoom){
    insideRoom = false;
    showOverlay = false;
    overlay.style.opacity = '0';
    overlay.style.pointerEvents = 'none';
    doorOpen = false;
    scroll = 1.0;
    setTimeout(()=>{ scroll = 0.75; },400);
  }
});

const clock = new THREE.Clock();
let t = 0;

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  t += dt;

  // Particles float
  particles.forEach(p=>{
    p.position.y += p.userData.speed;
    p.position.x += Math.sin(t*0.5 + p.userData.phase)*0.003;
    if(p.position.y > 4.5) p.position.y = 0;
  });

  // Camera walk based on scroll
  const targetZ = 10 - scroll * 11;
  camera.position.z += (targetZ - camera.position.z)*0.08;

  // Look slightly toward door
  const lookY = 1.4 + scroll*0.3;
  camera.lookAt(0, lookY, -2);

  // Door open animation
  if(doorOpen && !insideRoom){
    doorAngle += dt * 2.5;
    if(doorAngle >= Math.PI/2){
      doorAngle = Math.PI/2;
      // Move inside
      setTimeout(()=>{
        insideRoom = true;
        showOverlay = true;
        overlay.style.opacity = '1';
        overlay.style.pointerEvents = 'auto';
        hint.textContent = 'Click anywhere to step back';
      }, 300);
    }
  }
  doorL.rotation.y = doorAngle;
  doorL.position.x = -0.5 + Math.sin(doorAngle)*0.5;
  doorR.rotation.y = -doorAngle;
  doorR.position.x = 0.5 - Math.sin(doorAngle)*0.5;

  // Door glow when close
  const closeness = Math.max(0, scroll - 0.5)*2;
  glowMat.opacity = closeness * 0.35 + (doorOpen? 0.6:0);
  doorLight.intensity = 1 + closeness*3 + (doorOpen?4:0);

  // Hint text
  if(!insideRoom){
    if(scroll < 0.7){
      hint.textContent = 'Scroll to walk forward';
    } else {
      hint.textContent = 'Click the door to enter';
    }
  }

  // Camera bob
  camera.position.y = 1.6 + Math.sin(t*1.8)*0.03 * scroll;

  renderer.render(scene, camera);
}
animate();
})();
</script>
